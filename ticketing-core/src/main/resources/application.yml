server:
  port: 8030

spring:
  application:
    name: ticketing-core
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/ticketing
    username: ticketing
    password: ticketing_pw
  data:
    redis:
      cluster:
        nodes: ${REDIS_CLUSTER_NODES:localhost:7001,localhost:7002,localhost:7003}

core:
  session:
    secret: ${CORE_SESSION_SECRET:dev-core-secret-key-change-in-production}
    ttl-sec: 300
  enter-token:
    secret: ${ENTER_TOKEN_SECRET:dev-enter-secret-key-change-in-production}
  hold:
    ttl-sec: 60
  scheduler:
    hold-cleanup-interval-ms: 2000
    active-cleanup-interval-ms: 10000
  soldout:
    ttl-sec: 86400

management:
  endpoints:
    web:
      exposure:
        include: health,info
