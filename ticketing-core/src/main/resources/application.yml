server:
  port: 8030

spring:
  application:
    name: ticketing-core
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/ticketing
    username: ticketing
    password: ticketing_pw
  data:
    redis:
      cluster:
        nodes: ${REDIS_CLUSTER_NODES:localhost:7001,localhost:7002,localhost:7003}

core:
  event-id: ${CORE_EVENT_ID:a0000000-0000-0000-0000-000000000001}
  session:
    secret: ${CORE_SESSION_SECRET:core-secret-key}
    ttl-sec: 300
    cookie-name: core_session
  enter-token:
    secret: ${ENTER_TOKEN_SECRET:enter-secret-key}
  hold:
    ttl-sec: 60
    max-per-client: 4
  scheduler:
    hold-cleanup-interval-ms: 2000
    active-cleanup-interval-ms: 10000
  soldout:
    ttl-sec: 86400

management:
  endpoints:
    web:
      exposure:
        include: health,info
