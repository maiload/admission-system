server:
  port: 8010

spring:
  application:
    name: queue-gate
  data:
    redis:
      cluster:
        nodes: ${REDIS_CLUSTER_NODES:localhost:7001,localhost:7002,localhost:7003}

gate:
  sync:
    token-secret: ${SYNC_TOKEN_SECRET:sync-secret-key}
    join-window-before-ms: 0
    join-window-after-ms: ${GATE_SYNC_JOIN_WINDOW_AFTER_MS:3600000}
    token-ttl-after-start-ms: ${GATE_SYNC_TOKEN_TTL_AFTER_START_MS:3600000}
    simulation:
      enabled: true
      offset-ms: 3000
      exit-rate-per-sec: 200
  queue:
    state-ttl-sec: 600
  sse:
    push-interval-ms: 1000
  client:
    cookie-name: cid
    cookie-max-age-days: 1

management:
  endpoints:
    web:
      exposure:
        include: health,info
