services:
  # --- queue-gate (x2) ---
  queue-gate-1:
    build:
      context: ..
      dockerfile: infra/Dockerfile.gate
    environment:
      REDIS_CLUSTER_NODES: redis-node-1:6379,redis-node-2:6379,redis-node-3:6379
      GATE_SYNC_JOIN_WINDOW_AFTER_MS: 3600000
      GATE_SYNC_TOKEN_TTL_AFTER_START_MS: 3600000
    networks:
      - data-net
      - redis-cluster
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8010/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  queue-gate-2:
    build:
      context: ..
      dockerfile: infra/Dockerfile.gate
    environment:
      REDIS_CLUSTER_NODES: redis-node-1:6379,redis-node-2:6379,redis-node-3:6379
      GATE_SYNC_JOIN_WINDOW_AFTER_MS: 86400000
      GATE_SYNC_TOKEN_TTL_AFTER_START_MS: 86400000
    networks:
      - data-net
      - redis-cluster
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8010/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --- admission-worker ---
  admission-worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    environment:
      REDIS_CLUSTER_NODES: redis-node-1:6379,redis-node-2:6379,redis-node-3:6379
      ADMISSION_TOKEN_TTL_SEC: 120
    networks:
      - data-net
      - redis-cluster

  # --- ticketing-core (x2) ---
  ticketing-core-1:
    build:
      context: ..
      dockerfile: infra/Dockerfile.core
    environment:
      SPRING_R2DBC_URL: r2dbc:postgresql://postgres:5432/ticketing
      SPRING_R2DBC_USERNAME: ticketing
      SPRING_R2DBC_PASSWORD: ticketing_pw
      REDIS_CLUSTER_NODES: redis-node-1:6379,redis-node-2:6379,redis-node-3:6379
    networks:
      - data-net
      - redis-cluster
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8030/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ticketing-core-2:
    build:
      context: ..
      dockerfile: infra/Dockerfile.core
    environment:
      SPRING_R2DBC_URL: r2dbc:postgresql://postgres:5432/ticketing
      SPRING_R2DBC_USERNAME: ticketing
      SPRING_R2DBC_PASSWORD: ticketing_pw
      REDIS_CLUSTER_NODES: redis-node-1:6379,redis-node-2:6379,redis-node-3:6379
    networks:
      - data-net
      - redis-cluster
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8030/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --- HAProxy ---
  haproxy:
    image: haproxy:2.9
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "8010:8010"
      - "8030:8030"
      - "9000:9000"
    depends_on:
      queue-gate-1:
        condition: service_healthy
      queue-gate-2:
        condition: service_healthy
      ticketing-core-1:
        condition: service_healthy
      ticketing-core-2:
        condition: service_healthy
    networks:
      - data-net

networks:
  data-net:
    external: true
  redis-cluster:
    external: true
