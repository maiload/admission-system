services:
  # --- PostgreSQL ---
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ticketing
      POSTGRES_USER: ticketing
      POSTGRES_PASSWORD: ticketing_pw
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - data-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketing"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Redis Cluster (6 nodes) ---
  redis-node-1:
    image: redis:7
    command: >
      redis-server
      --port 6379
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
    ports:
      - "7001:6379"
    volumes:
      - redis-data-1:/data
    networks:
      - data-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-node-2:
    image: redis:7
    command: >
      redis-server
      --port 6379
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
    ports:
      - "7002:6379"
    volumes:
      - redis-data-2:/data
    networks:
      - data-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-node-3:
    image: redis:7
    command: >
      redis-server
      --port 6379
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
    ports:
      - "7003:6379"
    volumes:
      - redis-data-3:/data
    networks:
      - data-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-node-4:
    image: redis:7
    command: >
      redis-server
      --port 6379
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
    ports:
      - "7004:6379"
    volumes:
      - redis-data-4:/data
    networks:
      - data-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-node-5:
    image: redis:7
    command: >
      redis-server
      --port 6379
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
    ports:
      - "7005:6379"
    volumes:
      - redis-data-5:/data
    networks:
      - data-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-node-6:
    image: redis:7
    command: >
      redis-server
      --port 6379
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
    ports:
      - "7006:6379"
    volumes:
      - redis-data-6:/data
    networks:
      - data-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-cluster-init:
    image: redis:7
    depends_on:
      redis-node-1:
        condition: service_healthy
      redis-node-2:
        condition: service_healthy
      redis-node-3:
        condition: service_healthy
      redis-node-4:
        condition: service_healthy
      redis-node-5:
        condition: service_healthy
      redis-node-6:
        condition: service_healthy
    entrypoint: ["sh", "-c", "echo 'Creating Redis Cluster...' && redis-cli --cluster create redis-node-1:6379 redis-node-2:6379 redis-node-3:6379 redis-node-4:6379 redis-node-5:6379 redis-node-6:6379 --cluster-replicas 1 --cluster-yes && echo 'Redis Cluster created successfully'"]
    networks:
      - data-net

  # --- queue-gate (x2) ---
  queue-gate-1:
    build:
      context: ..
      dockerfile: infra/Dockerfile.gate
    environment:
      REDIS_CLUSTER_NODES: redis-node-1:6379,redis-node-2:6379,redis-node-3:6379
      GATE_SYNC_JOIN_WINDOW_AFTER_MS: 3600000
      GATE_SYNC_TOKEN_TTL_AFTER_START_MS: 3600000
    depends_on:
      redis-cluster-init:
        condition: service_completed_successfully
    networks:
      - data-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8010/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  queue-gate-2:
    build:
      context: ..
      dockerfile: infra/Dockerfile.gate
    environment:
      REDIS_CLUSTER_NODES: redis-node-1:6379,redis-node-2:6379,redis-node-3:6379
      GATE_SYNC_JOIN_WINDOW_AFTER_MS: 3600000
      GATE_SYNC_TOKEN_TTL_AFTER_START_MS: 3600000
    depends_on:
      redis-cluster-init:
        condition: service_completed_successfully
    networks:
      - data-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8010/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --- admission-worker ---
  admission-worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    environment:
      REDIS_CLUSTER_NODES: redis-node-1:6379,redis-node-2:6379,redis-node-3:6379
      ADMISSION_TOKEN_TTL_SEC: 1800
    depends_on:
      redis-cluster-init:
        condition: service_completed_successfully
    networks:
      - data-net

  # --- ticketing-core (x2) ---
  ticketing-core-1:
    build:
      context: ..
      dockerfile: infra/Dockerfile.core
    environment:
      SPRING_R2DBC_URL: r2dbc:postgresql://postgres:5432/ticketing
      SPRING_R2DBC_USERNAME: ticketing
      SPRING_R2DBC_PASSWORD: ticketing_pw
      REDIS_CLUSTER_NODES: redis-node-1:6379,redis-node-2:6379,redis-node-3:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis-cluster-init:
        condition: service_completed_successfully
    networks:
      - data-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8030/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ticketing-core-2:
    build:
      context: ..
      dockerfile: infra/Dockerfile.core
    environment:
      SPRING_R2DBC_URL: r2dbc:postgresql://postgres:5432/ticketing
      SPRING_R2DBC_USERNAME: ticketing
      SPRING_R2DBC_PASSWORD: ticketing_pw
      REDIS_CLUSTER_NODES: redis-node-1:6379,redis-node-2:6379,redis-node-3:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis-cluster-init:
        condition: service_completed_successfully
    networks:
      - data-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8030/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --- HAProxy ---
  haproxy:
    image: haproxy:2.9
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "8010:8010"
      - "8030:8030"
      - "9000:9000"
    depends_on:
      queue-gate-1:
        condition: service_healthy
      queue-gate-2:
        condition: service_healthy
      ticketing-core-1:
        condition: service_healthy
      ticketing-core-2:
        condition: service_healthy
    networks:
      - data-net

  # --- Frontend (Nginx) ---
  frontend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - haproxy
    networks:
      - data-net

volumes:
  postgres-data:
  redis-data-1:
  redis-data-2:
  redis-data-3:
  redis-data-4:
  redis-data-5:
  redis-data-6:

networks:
  data-net:
    driver: bridge
